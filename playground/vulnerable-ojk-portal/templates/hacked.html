<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKED !!! SYSTEM OVERRIDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: black;
            color: red;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        h1 {
            text-shadow: 0 0 20px red;
            animation: glitch 2s linear infinite;
        }

        .binary-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.2;
            color: #2fff00;
            pointer-events: none;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 10px;
        }

        @keyframes glitch {

            2%,
            64% {
                transform: translate(2px, 0) skew(0deg);
            }

            4%,
            60% {
                transform: translate(-2px, 0) skew(0deg);
            }

            62% {
                transform: translate(0, 0) skew(5deg);
            }
        }
    </style>
</head>

<body class="flex flex-col items-center justify-center min-h-screen p-10 text-center">
    <!-- Binary Fall Effect -->
    <div id="matrix" class="binary-bg"></div>

    <h1 class="text-7xl font-black mb-10 tracking-widest uppercase">HACKED BY APT-X</h1>

    <div class="bg-red-950/20 border-2 border-red-500 p-8 rounded-xl backdrop-blur-md shadow-2xl shadow-red-900/50">
        <p class="text-3xl font-bold text-white mb-6 uppercase tracking-wider">Target: {{ message }}</p>
        <p class="text-emerald-400 font-mono text-xl animate-pulse">SECURITY IS AN ILLUSION.</p>
        <p class="text-emerald-400 font-mono text-xl animate-pulse">WE OWN THIS SYSTEM NOW.</p>
    </div>

    <div class="mt-20">
        <p class="text-red-500 font-mono text-sm tracking-widest animate-pulse">SYSTEM CORRUPTION: 100% | DATA
            ENFILTRATION: COMPLETE</p>
        <div class="mt-4 w-64 h-2 bg-red-900/50 rounded-full mx-auto relative overflow-hidden border border-red-500/30">
            <div class="absolute inset-y-0 left-0 bg-red-500 w-full animate-[loading_5s_linear_infinite]"></div>
        </div>
    </div>

    <script>
        // Matrix Rain Visual
        const matrix = document.getElementById('matrix');
        let binary = '';
        for (let i = 0; i < 5000; i++) {
            binary += Math.round(Math.random());
        }
        matrix.innerText = binary;

        // POLLING: Cek status pemulihan
        setInterval(async () => {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                if (!data.is_defaced) {
                    window.location.reload();
                }
            } catch (err) { }
        }, 1000);
    </script>
</body>

</html>
