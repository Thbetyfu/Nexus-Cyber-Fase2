version: "3.8"

services:
  # Distributed Cache / Token Bucket Store
  redis:
    image: redis:7.2-alpine
    container_name: nexus_redis
    # Dihapus demi Security Best Practice (Enterprise Grade)
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Core Gateway (Golang)
  gateway:
    build:
      context: ./nexus-core-gateway
      dockerfile: Dockerfile
    container_name: nexus_gateway
    ports:
      - "8080:8080" # Gateway Port
      - "9090:9090" # Honeypot Port
    environment:
      - REDIS_URL=redis:6379
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AI_PROVIDER_URL=${AI_PROVIDER_URL}
      - AI_PROVIDER_KEY=${AI_PROVIDER_KEY}
      - NEXUS_SESSION_SECRET=${NEXUS_SESSION_SECRET:-super-secret-matrix-key-2026}
    cap_add:
      - NET_ADMIN
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  # Next.js Command Center SOC (MTD Matrix v7.0)
  dashboard:
    build:
      context: ./nexus-admin-dashboard
      dockerfile: Dockerfile
      target: deps # Stop at deps stage to keep node_modules ready
    container_name: nexus_dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
      - NODE_ENV=development # Force dev mode for HMR
    env_file:
      - .env
    volumes:
      - ./nexus-admin-dashboard:/app
      - /app/node_modules # Persistent node_modules in container
      - /app/.next # Persistent next build artifacts
    command: npm run dev
    depends_on:
      - gateway
    restart: always

volumes:
  redis_data:
